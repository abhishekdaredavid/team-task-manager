<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Member Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen">

    <nav class="bg-gray-800 p-4 text-white flex justify-between items-center shadow-md">
        <h1 class="text-xl font-bold">Member Dashboard</h1>
        <button onclick="logout()" class="bg-red-500 px-4 py-2 rounded hover:bg-red-600 transition">Logout</button>
    </nav>

    <div class="container mx-auto mt-8 p-4">
        <div class="bg-white p-6 rounded-lg shadow-md">
            <h2 class="text-lg font-semibold mb-4 border-b pb-2">Projects & Tasks Overview</h2>
            
            <div id="projects-container" class="space-y-6">
                <p class="text-gray-500">Loading tasks...</p>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "https://team-task-manager-production-46fb.up.railway.app/docs";
        const token = localStorage.getItem('token');

        // Security check
        if (!token) {
            window.location.href = 'index.html';
        }

        function logout() {
            localStorage.clear();
            window.location.href = 'index.html';
        }

        // Fetch Projects and Tasks
        async function fetchProjects() {
            const res = await fetch(`${API_URL}/projects`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const projects = await res.json();
            const container = document.getElementById('projects-container');
            container.innerHTML = '';

            if (projects.length === 0) {
                container.innerHTML = '<p class="text-gray-500">No projects found.</p>';
                return;
            }

            projects.forEach(proj => {
                let projectHtml = `
                    <div class="border rounded-md p-4 bg-gray-50">
                        <h3 class="font-bold text-blue-600 text-lg">${proj.name}</h3>
                        <p class="text-sm text-gray-600 mb-3">${proj.description || 'No description'}</p>
                        <div class="space-y-2">
                `;

                if (proj.tasks.length === 0) {
                    projectHtml += `<p class="text-xs text-gray-500">No tasks assigned yet.</p>`;
                } else {
                    proj.tasks.forEach(task => {
                        let statusColor = task.status === 'Completed' ? 'text-green-600' : 'text-orange-500';
                        projectHtml += `
                            <div class="flex justify-between items-center bg-white p-2 border rounded text-sm">
                                <div>
                                    <span class="font-semibold">Task ID ${task.id}:</span> ${task.title}
                                    <span class="ml-2 ${statusColor} font-bold">(${task.status})</span>
                                </div>
                                <div class="flex items-center space-x-2">
                                    <select id="status-${task.id}" class="border p-1 rounded text-xs">
                                        <option value="Pending" ${task.status === 'Pending' ? 'selected' : ''}>Pending</option>
                                        <option value="In-Progress" ${task.status === 'In-Progress' ? 'selected' : ''}>In-Progress</option>
                                        <option value="Completed" ${task.status === 'Completed' ? 'selected' : ''}>Completed</option>
                                    </select>
                                    <button onclick="updateStatus(${task.id})" class="bg-blue-500 text-white px-2 py-1 rounded text-xs hover:bg-blue-600">Update</button>
                                </div>
                            </div>
                        `;
                    });
                }
                projectHtml += `</div></div>`;
                container.innerHTML += projectHtml;
            });
        }

        // Update Task Status API Call
        async function updateStatus(taskId) {
            const newStatus = document.getElementById(`status-${taskId}`).value;
            const res = await fetch(`${API_URL}/tasks/${taskId}/status?status=${newStatus}`, {
                method: 'PUT',
                headers: { 'Authorization': `Bearer ${token}` }
            });

            if (res.ok) {
                alert("Status updated successfully!");
                fetchProjects(); // Refresh UI
            } else {
                const error = await res.json();
                alert("Update failed: " + (error.detail || "You can only update your own tasks"));
            }
        }

        // Run fetch on load
        fetchProjects();
    </script>
</body>
</html>
