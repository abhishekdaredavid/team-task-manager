<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team Task Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center h-screen">

    <div class="bg-white p-8 rounded-lg shadow-md w-96">
        <h2 class="text-2xl font-bold mb-6 text-center text-blue-600">Signup / Login</h2>
        
        <form id="authForm" class="space-y-4">
            <input type="text" id="fullName" placeholder="Full Name (For Signup only)" class="w-full px-4 py-2 border rounded">
            <input type="email" id="email" placeholder="Email" required class="w-full px-4 py-2 border rounded">
            <input type="password" id="password" placeholder="Password" required class="w-full px-4 py-2 border rounded">
            
            <select id="role" class="w-full px-4 py-2 border rounded">
                <option value="Admin">Admin</option>
                <option value="Member">Member</option>
            </select>

            <div class="flex space-x-2 mt-4">
                <button type="button" id="signupBtn" class="w-1/2 bg-blue-500 text-white py-2 rounded hover:bg-blue-600">Signup</button>
                <button type="button" id="loginBtn" class="w-1/2 bg-green-500 text-white py-2 rounded hover:bg-green-600">Login</button>
            </div>
        </form>
        <p id="message" class="text-center mt-4 text-sm font-semibold"></p>
    </div>

    <script>
        // YAHAN APNA RAILWAY URL DALEIN (Bina aakhri '/' ke)
        const API_URL = "https://your-app-name.up.railway.app"; 

        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const fullNameInput = document.getElementById('fullName');
        const roleInput = document.getElementById('role');
        const messageBox = document.getElementById('message');

        // Signup Logic
        document.getElementById('signupBtn').addEventListener('click', async (e) => {
            e.preventDefault(); // Page reload rokne ke liye
            try {
                const response = await fetch(`${API_URL}/signup`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: emailInput.value,
                        password: passwordInput.value,
                        full_name: fullNameInput.value || "User",
                        role: roleInput.value
                    })
                });
                
                const data = await response.json();
                if (response.ok) {
                    messageBox.style.color = "green";
                    messageBox.innerText = "Registration Successful! Please Login.";
                } else {
                    messageBox.style.color = "red";
                    messageBox.innerText = data.detail || "Error in Signup";
                }
            } catch (error) {
                console.error(error);
                messageBox.style.color = "red";
                messageBox.innerText = "Network Error. Check API_URL.";
            }
        });

        // Login Logic
        document.getElementById('loginBtn').addEventListener('click', async (e) => {
            e.preventDefault();
            try {
                const response = await fetch(`${API_URL}/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: emailInput.value,
                        password: passwordInput.value
                    })
                });
                
                const data = await response.json();
                if (response.ok) {
                    messageBox.style.color = "green";
                    messageBox.innerText = "Login Successful!";
                    // Save token and redirect
                    localStorage.setItem("token", data.access_token);
                    if (data.role === "Admin") {
                        window.location.href = "admin.html";
                    } else {
                        window.location.href = "member.html";
                    }
                } else {
                    messageBox.style.color = "red";
                    messageBox.innerText = data.detail || "Invalid Credentials";
                }
            } catch (error) {
                console.error(error);
                messageBox.style.color = "red";
                messageBox.innerText = "Network Error. Check API_URL.";
            }
        });
    </script>
</body>
</html>
